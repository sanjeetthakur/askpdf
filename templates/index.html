<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local PDF RAG</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Local-first RAG workspace</p>
          <h1>Ask your PDF</h1>
        </div>
        <div class="status-panel">
          <span class="pulse"></span>
          <span id="modelStatus">Checking local model...</span>
        </div>
      </section>

      <section class="workspace">
        <aside class="upload-panel">
          <div class="panel-heading">
            <span class="step">01</span>
            <div>
              <h2>Upload PDF</h2>
              <p>Text is extracted, chunked, embedded, and indexed locally.</p>
            </div>
          </div>

          <label class="drop-zone" for="pdfInput">
            <input id="pdfInput" type="file" accept="application/pdf" />
            <span class="upload-icon">PDF</span>
            <strong>Choose a document</strong>
            <small>Up to 25 MB</small>
          </label>

          <button id="uploadButton" class="primary-button">Analyze Document</button>

          <div id="docMeta" class="doc-meta hidden"></div>
        </aside>

        <section class="chat-panel">
          <div class="panel-heading">
            <span class="step">02</span>
            <div>
              <h2>Question Answering</h2>
              <p>Responses are grounded in the retrieved PDF passages.</p>
            </div>
          </div>

          <div id="messages" class="messages">
            <div class="message assistant">
              <span>Upload a PDF to initialize the local retrieval pipeline.</span>
            </div>
          </div>

          <form id="questionForm" class="question-form">
            <input id="questionInput" type="text" placeholder="Ask something from the PDF..." autocomplete="off" />
            <button class="send-button" type="submit">Ask</button>
          </form>
        </section>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
